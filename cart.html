<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Cart — VOLT Electronics</title>
<link rel="stylesheet" href="shared.css"/>
<style>
.cart-wrap{padding:2rem clamp(1rem,5vw,5rem) 5rem;max-width:1200px;margin:0 auto}
.cart-title{font-family:var(--display);font-size:clamp(2rem,5vw,3rem);font-weight:800;letter-spacing:-0.03em;margin-bottom:2.5rem}
.cart-title span{color:var(--yellow)}
.cart-layout{display:grid;grid-template-columns:1fr 360px;gap:3rem;align-items:start}
/* ITEMS */
.cart-items-head{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:1rem;padding:0.8rem 1rem;background:var(--surface);border:1px solid var(--border);font-size:0.72rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:0}
.cart-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:1rem;padding:1.2rem 1rem;border:1px solid var(--border);border-top:none;align-items:center;background:var(--surface);transition:background 0.2s}
.cart-row:hover{background:var(--surface2)}
.cart-prod{display:flex;align-items:center;gap:1rem}
.cart-img{width:70px;height:70px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cart-img img{width:80%;height:80%;object-fit:contain}
.cart-prod-name{font-family:var(--display);font-size:0.9rem;font-weight:700;line-height:1.3;margin-bottom:0.2rem}
.cart-prod-brand{font-size:0.75rem;color:var(--muted)}
.cart-remove{font-size:0.72rem;color:var(--muted);background:none;border:none;cursor:pointer;transition:color 0.2s;margin-top:0.4rem;display:block;text-align:left;font-family:var(--body)}
.cart-remove:hover{color:var(--pink)}
.cart-unit-price{font-size:0.88rem;color:var(--muted)}
.qty-ctrl{display:flex;align-items:center;border:1px solid var(--border);width:fit-content}
.qty-btn{background:var(--surface2);border:none;color:var(--text);width:32px;height:32px;font-size:1rem;cursor:pointer;transition:background 0.2s}
.qty-btn:hover{background:var(--yellow);color:#0a0a0f}
.qty-num{width:36px;text-align:center;font-family:var(--display);font-weight:700;font-size:0.85rem;background:none;border:none;color:var(--text);pointer-events:none}
.item-total{font-family:var(--display);font-size:1rem;font-weight:800;color:var(--yellow)}
.cart-actions{display:flex;justify-content:space-between;align-items:center;margin-top:1.5rem;flex-wrap:wrap;gap:1rem}
.clear-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:0.6rem 1.2rem;font-family:var(--display);font-size:0.75rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;transition:all 0.2s}
.clear-btn:hover{border-color:var(--pink);color:var(--pink)}
/* ORDER SUMMARY */
.order-summary{background:var(--surface);border:1px solid var(--border);padding:1.8rem;position:sticky;top:88px}
.os-title{font-family:var(--display);font-size:1rem;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}
.os-row{display:flex;justify-content:space-between;font-size:0.85rem;color:var(--muted);margin-bottom:0.8rem}
.os-row.total{font-family:var(--display);font-weight:800;font-size:1.2rem;color:var(--text);margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border)}
.os-row.total span:last-child{color:var(--yellow)}
.promo-row{display:flex;gap:0;margin:1.2rem 0}
.promo-row input{flex:1;background:var(--surface2);border:1px solid var(--border);border-right:none;color:var(--text);padding:0.7rem 0.9rem;font-family:var(--body);font-size:0.85rem;outline:none}
.promo-row button{background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:0.7rem 1rem;font-family:var(--display);font-size:0.75rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;white-space:nowrap;transition:all 0.2s}
.promo-row button:hover{background:var(--cyan);border-color:var(--cyan);color:#0a0a0f}
.checkout-cta{width:100%;background:var(--yellow);color:#0a0a0f;border:none;padding:1rem;font-family:var(--display);font-size:0.9rem;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;transition:all 0.2s;margin-top:1.2rem;display:block;text-align:center}
.checkout-cta:hover{background:var(--cyan)}
.continue-shopping{display:block;text-align:center;margin-top:1rem;font-size:0.8rem;color:var(--muted);transition:color 0.2s}
.continue-shopping:hover{color:var(--yellow)}
/* EMPTY STATE */
.empty-cart{text-align:center;padding:6rem 2rem}
.empty-icon{font-size:4rem;margin-bottom:1.5rem}
.empty-title{font-family:var(--display);font-size:2rem;font-weight:800;margin-bottom:0.8rem}
.empty-sub{color:var(--muted);margin-bottom:2rem}
@media(max-width:900px){.cart-layout{grid-template-columns:1fr}.order-summary{position:static}.cart-items-head{display:none}.cart-row{grid-template-columns:1fr;gap:0.8rem}}
</style>
</head>
<body>
<nav>
  <a class="logo" href="index.html">VOLT<span>.</span></a>
  <ul class="nav-links">
    <li><a href="shop.html">Shop</a></li>
    <li><a href="shop.html?cat=Phones">Phones</a></li>
    <li><a href="shop.html?cat=Laptops">Laptops</a></li>
    <li><a href="about.html">About</a></li>
  </ul>
  <div class="nav-right">
    <a href="cart.html" class="cart-btn"><span>🛒</span><span class="cart-label">Cart</span><span class="cart-count">0</span></a>
  </div>
  <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
</nav>
<div class="mobile-menu" id="mobileMenu">
  <a href="index.html">Home</a><a href="shop.html">Shop</a><a href="cart.html">Cart (<span class="mob-cart-count">0</span>)</a>
</div>

<div class="breadcrumb"><a href="index.html">Home</a> › <span>Cart</span></div>

<div class="cart-wrap">
  <h1 class="cart-title">Your <span>Cart</span></h1>
  <div id="cart-content"></div>
</div>

<footer>
  <div class="footer-grid">
    <div><a class="logo" href="index.html">VOLT<span>.</span></a><p class="footer-brand-desc">Next-gen electronics at unbeatable prices.</p></div>
    <div class="footer-col"><h4>Shop</h4><ul><li><a href="shop.html">All Products</a></li><li><a href="shop.html?cat=Phones">Phones</a></li></ul></div>
    <div class="footer-col"><h4>Company</h4><ul><li><a href="about.html">About</a></li><li><a href="contact.html">Contact</a></li></ul></div>
    <div class="footer-col"><h4>Support</h4><ul><li><a href="faq.html">FAQ</a></li><li><a href="#">Returns</a></li></ul></div>
  </div>
  <div class="footer-bottom"><p>© 2026 VOLT Electronics.</p></div>
</footer>

<script src="shared.js"></script>
<script>
function renderCart() {
  const cart = getCart();
  const content = document.getElementById('cart-content');
  if (!cart.length) {
    content.innerHTML = `<div class="empty-cart"><div class="empty-icon">🛒</div><h2 class="empty-title">Your cart is empty</h2><p class="empty-sub">Looks like you haven't added anything yet.</p><a href="shop.html" class="btn-primary">Start Shopping</a></div>`;
    return;
  }
  const sub = cart.reduce((s,c) => s+c.price*c.qty, 0);
  const tax = Math.round(sub * 0.18);
  const total = sub + tax;
  content.innerHTML = `
    <div class="cart-layout">
      <div>
        <div class="cart-items-head"><span>Product</span><span>Price</span><span>Qty</span><span>Total</span></div>
        ${cart.map(c => `
          <div class="cart-row" id="row-${c.id}">
            <div class="cart-prod">
              <div class="cart-img"><img src="${c.img}" alt="${c.name}"></div>
              <div><div class="cart-prod-name">${c.name}</div><div class="cart-prod-brand">${c.brand}</div><button class="cart-remove" onclick="rmItem(${c.id})">Remove</button></div>
            </div>
            <div class="cart-unit-price">${fmtPrice(c.price)}</div>
            <div class="qty-ctrl"><button class="qty-btn" onclick="chQty(${c.id},-1)">−</button><span class="qty-num">${c.qty}</span><button class="qty-btn" onclick="chQty(${c.id},1)">+</button></div>
            <div class="item-total">${fmtPrice(c.price*c.qty)}</div>
          </div>`).join('')}
        <div class="cart-actions">
          <button class="clear-btn" onclick="clearCart()">Clear Cart</button>
          <a href="shop.html" style="font-size:0.82rem;color:var(--muted);font-weight:500">← Continue Shopping</a>
        </div>
      </div>
      <div>
        <div class="order-summary">
          <p class="os-title">Order Summary</p>
          <div class="os-row"><span>Subtotal (${cart.reduce((s,c)=>s+c.qty,0)} items)</span><span>${fmtPrice(sub)}</span></div>
          <div class="os-row"><span>Shipping</span><span style="color:var(--green)">FREE</span></div>
          <div class="os-row"><span>GST (18%)</span><span>${fmtPrice(tax)}</span></div>
          <div class="os-row total"><span>Total</span><span>${fmtPrice(total)}</span></div>
          <div class="promo-row"><input type="text" placeholder="Promo code" id="promo-input"/><button onclick="applyPromo()">Apply</button></div>
          <a href="checkout.html" class="checkout-cta">Proceed to Checkout →</a>
          <a href="shop.html" class="continue-shopping">← Continue Shopping</a>
        </div>
      </div>
    </div>`;
}

function rmItem(id){ let c=getCart(); saveCart(c.filter(x=>x.id!==id)); updateAllCartCounts(); renderCart(); }
function chQty(id,d){ let c=getCart(); const it=c.find(x=>x.id===id); if(it){ it.qty=Math.max(1,Math.min(10,it.qty+d)); saveCart(c); updateAllCartCounts(); renderCart(); } }
function clearCart(){ if(confirm('Clear all items?')){ saveCart([]); updateAllCartCounts(); renderCart(); } }
function applyPromo(){ const v=document.getElementById('promo-input')?.value; showToast(v?'Promo "'+v+'" is not valid. Try VOLT10 next time!':'Enter a promo code'); }

renderCart();
</script>
</body>
</html>
